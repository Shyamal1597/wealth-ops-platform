<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <rect width="100" height="100" rx="18"/>
    </clipPath>
  </defs>
  <!-- Red rounded background -->
  <rect width="100" height="100" rx="18" fill="#E42020"/>
  <g clip-path="url(#c)">
    <!-- White diamond -->
    <rect x="20" y="20" width="60" height="60" fill="#FFFFFF" transform="rotate(45 50 50)"/>
    <!-- Red inner square -->
    <rect x="30" y="30" width="40" height="40" fill="#E42020"/>
    <!-- Blue circle -->
    <circle cx="50" cy="50" r="16" fill="#1550B0"/>
  </g>
</svg>
